<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NK Klassement 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;0,9..40,800;1,9..40,400&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Ambient background -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="bg-orb bg-orb--1"></div>
    <div class="bg-orb bg-orb--2"></div>
    <div class="bg-orb bg-orb--3"></div>
  </div>

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar__brand">
      <span class="topbar__logo">⛸</span>
      <span class="topbar__title">NK Klassement</span>
      <span class="topbar__year">2026</span>
    </div>
    <div class="topbar__controls">
      <span id="statusBadge" class="status-badge status-badge--waiting">
        <span class="status-badge__pulse"></span>
        <span class="status-badge__text">Wachten</span>
      </span>
      <button id="debugBtn" class="btn btn--ghost" title="Debug">🔍</button>
    </div>
  </header>

  <!-- Layout -->
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar__section">
        <div class="sidebar__label">Toernooi</div>
        <div id="moduleTabs" class="tab-group tab-group--vertical">
          <button class="tab" data-module="allround">NK Allround</button>
          <button class="tab" data-module="sprint">NK Sprint</button>
        </div>
      </div>
      <div class="sidebar__section">
        <div class="sidebar__label">Categorie</div>
        <div id="genderTabs" class="tab-group tab-group--vertical">
          <button class="tab" data-gender="v">♀ Vrouwen</button>
          <button class="tab" data-gender="m">♂ Mannen</button>
        </div>
      </div>
      <div class="sidebar__section">
        <div class="sidebar__label">Weergave</div>
        <div id="viewButtons" class="tab-group tab-group--vertical"></div>
      </div>
      <div class="sidebar__section sidebar__section--bottom">
        <button id="entryBtn" class="cta cta--entry">⚡ Invoer</button>
        <button id="exportBtn" class="btn btn--outline btn--sm">📥 CSV Export</button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="stage">
      <div class="stage__header">
        <h1 id="viewTitle" class="stage__title">Klassement</h1>
        <div id="viewMeta" class="stage__meta"></div>
      </div>
      <div id="contentArea" class="stage__body"></div>
    </main>
  </div>

  <!-- H2H form (hidden by default) -->
  <div id="h2hForm" class="h2h-form" hidden>
    <div class="h2h-form__row">
      <select id="h2hRiderA"></select>
      <span class="h2h-form__vs">VS</span>
      <select id="h2hRiderB"></select>
    </div>
    <div class="h2h-form__row">
      <label>Berekening op: <select id="h2hFocusDistance"></select></label>
      <label>Target: <select id="h2hTargetRider"></select></label>
    </div>
  </div>

  <!-- Entry modal -->
  <div id="entryModal" class="popup-overlay" hidden>
    <div class="popup popup--entry"><div id="entryModalContent" class="popup__content"></div></div>
  </div>

  <!-- Athlete popup -->
  <div id="athletePopup" class="popup-overlay" hidden>
    <div class="popup"><div id="popupContent" class="popup__content"></div></div>
  </div>

  <!-- Debug panel -->
  <div id="debugPanel" class="popup-overlay" hidden>
    <div class="popup popup--debug"><div id="debugContent" class="popup__content"></div></div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
